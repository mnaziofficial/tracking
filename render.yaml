services:
  - type: web
    name: fuel-tracking-system
    runtime: php
    plan: free
    buildCommand: composer install --no-interaction --optimize-autoloader && npm install && npm run build && bash render-build.sh
    startCommand: bash -c 'php -S 0.0.0.0:$PORT -t public'
    healthCheckPath: /
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        value: base64:BmmZ993rARtI3Qb2Fs8X0Bh3gLE+rUI1dfe434LMqxs=
      - key: APP_URL
        fromService:
          type: web
          name: fuel-tracking-system
          property: url
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromService:
          type: pserv
          name: mysql
          property: host
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        value: fuel_tracking
      - key: DB_USERNAME
        fromService:
          type: pserv
          name: mysql
          property: username
      - key: DB_PASSWORD
        fromService:
          type: pserv
          name: mysql
          property: password
      - key: LOG_CHANNEL
        value: stderr
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
  
  - type: pserv
    name: mysql
    runtime: mysql
    plan: free
    ipAllowList: []
    envVars:
      - key: MYSQL_DATABASE
        value: fuel_tracking
      - key: MYSQL_USER
        value: fuel_user
      - key: MYSQL_PASSWORD
        generateValue: true
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true
